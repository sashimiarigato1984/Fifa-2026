<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 15px; background-color: #fff; color: #333; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        
        .header-section { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 12px; color: #666; text-transform: uppercase; }
        select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; 
            font-family: 'Inter'; font-size: 16px; background-color: #fff;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            border-bottom: 2px solid #1a1a1a; text-align: left; padding: 10px 5px; 
            font-size: 11px; font-weight: 700; text-transform: uppercase; 
        }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; overflow: hidden; }
        
        /* Mobile Column Widths */
        .col-date { width: 55px; color: #666; font-size: 12px; }
        .col-match { width: auto; }
        .col-venue { width: 90px; color: #666; font-size: 12px; text-align: right; }

        .match-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .team { display: flex; align-items: center; gap: 6px; font-weight: 600; white-space: nowrap; }
        .vs { font-size: 10px; color: #aaa; font-weight: 400; margin-left: 32px; }
        
        .flag {
            width: 24px; height: auto; aspect-ratio: 16/9; object-fit: cover;
            border-radius: 2px; border: 1px solid #f0f0f0;
        }

        /* Host Nation Backgrounds */
        .host-mx { background-color: #e8f5e9 !important; } /* Mexico Green */
        .host-us { background-color: #e3f2fd !important; } /* USA Blue */
        .host-ca { background-color: #ffebee !important; } /* Canada Red */

        @media (max-width: 375px) {
            .col-venue { display: none; } /* Hide venue on tiny screens to save space */
            th:last-child { display: none; }
            td { padding: 10px 2px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <label for="group-select">Gruppi Mondiale 2026</label>
        <select id="group-select" onchange="updateTable()">
            <option value="A">GRUPPO A</option>
            <option value="B">GRUPPO B</option>
            <option value="C">GRUPPO C</option>
            <option value="D">GRUPPO D</option>
            <option value="E">GRUPPO E</option>
            <option value="F">GRUPPO F</option>
            <option value="G">GRUPPO G</option>
            <option value="H">GRUPPO H</option>
            <option value="I">GRUPPO I</option>
            <option value="J">GRUPPO J</option>
            <option value="K">GRUPPO K</option>
            <option value="L">GRUPPO L</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th class="col-date">Data</th>
                <th class="col-match">Incontro</th>
                <th class="col-venue">Sede</th>
            </tr>
        </thead>
        <tbody id="table-content"></tbody>
    </table>
</div>

<script>
    const schedules = {
        A: [
            ["11 Giu", "Messico", "mx", "Sudafrica", "za", "CDMX", "mx"],
            ["12 Giu", "Corea del Sud", "kr", "Rep. Ceca", "cz", "Guadalajara", "mx"]
        ],
        B: [
            ["12 Giu", "Canada", "ca", "Bosnia", "ba", "Toronto", "ca"],
            ["13 Giu", "Qatar", "qa", "Svizzera", "ch", "San Francisco", "us"]
        ],
        D: [
            ["13 Giu", "USA", "us", "Paraguay", "py", "Los Angeles", "us"],
            ["14 Giu", "Australia", "au", "Turchia", "tr", "Vancouver", "ca"]
        ]
        // Add other groups following the pattern: [Date, T1, ISO1, T2, ISO2, Venue, HostCode]
    };

    function updateTable() {
        const group = document.getElementById("group-select").value;
        const tbody = document.getElementById("table-content");
        const matches = schedules[group] || [];
        tbody.innerHTML = "";

        matches.forEach(m => {
            const tr = document.createElement("tr");
            // Add background class based on host code
            if(m[6]) tr.className = `host-${m[6]}`;

            tr.innerHTML = `
                <td class="col-date">${m[0]}</td>
                <td class="col-match">
                    <div class="match-wrapper">
                        <div class="team"><img src="https://flagcdn.com{m[2]}.png" class="flag"><span>${m[1]}</span></div>
                        <div class="vs">vs</div>
                        <div class="team"><img src="https://flagcdn.com{m[4]}.png" class="flag"><span>${m[3]}</span></div>
                    </div>
                </td>
                <td class="col-venue">${m[5]}</td>
            `;
            tbody.appendChild(tr);
        });
    }
    updateTable();
</script>
</body>
</html>
